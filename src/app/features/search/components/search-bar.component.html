<div class="relative">
  <label for="search-input" class="sr-only">
    {{ 'search.placeholder' | transloco }}
  </label>

  <!-- Search icon -->
  <svg
    class="absolute left-3 top-1/2 h-5 w-5 -translate-y-1/2 text-(--color-text-secondary)"
    fill="none"
    stroke="currentColor"
    viewBox="0 0 24 24"
    aria-hidden="true"
    xmlns="http://www.w3.org/2000/svg"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="2"
      d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
    />
  </svg>

  <input
    #searchInput
    id="search-input"
    type="search"
    class="w-full rounded-xl border border-(--color-border) bg-(--color-surface) py-3 pl-11 pr-10 text-(--color-text-primary) placeholder:text-(--color-text-secondary) focus:border-(--color-primary) focus:outline-none focus:ring-2 focus:ring-(--color-primary)/30"
    [placeholder]="'search.placeholder' | transloco"
    autocomplete="off"
    (input)="onInput($event)"
  />

  <!-- Clear button — only visible when there is text -->
  <button
    type="button"
    class="absolute right-2 top-1/2 flex min-h-[36px] min-w-[36px] -translate-y-1/2 items-center justify-center rounded-full text-(--color-text-secondary) transition-colors md:hover:text-(--color-text-primary)"
    [attr.aria-label]="'a11y.closeDialog' | transloco"
    (click)="onClear()"
  >
    <svg
      class="h-4 w-4"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
      aria-hidden="true"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M6 18L18 6M6 6l12 12"
      />
    </svg>
  </button>
</div>
