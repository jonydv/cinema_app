@if (cast().length > 0) {
  <section class="py-3">
    <h2 class="mb-3 px-4 text-lg font-semibold text-[var(--color-text-primary)] md:px-6">
      {{ 'movie.cast' | transloco }}
    </h2>

    <!-- Horizontal scroll — negative margin to bleed past padding -->
    <div
      class="scrollbar-hide -mx-4 flex snap-x snap-mandatory gap-4 overflow-x-auto px-4 pb-2 md:-mx-6 md:px-6"
      role="list"
    >
      @for (actor of cast(); track actor.id) {
        <div
          class="flex w-[80px] shrink-0 snap-center flex-col items-center gap-1.5"
          role="listitem"
        >
          <div class="relative size-[64px] overflow-hidden rounded-full bg-[var(--color-skeleton)]">
            <img
              [src]="actor.profileUrl"
              [alt]="'a11y.profileAlt' | transloco: { name: actor.name }"
              width="64"
              height="64"
              class="h-full w-full object-cover"
              loading="lazy"
            />
          </div>
          <span
            class="line-clamp-2 text-center text-xs font-medium leading-tight text-[var(--color-text-primary)]"
          >
            {{ actor.name }}
          </span>
          <span class="line-clamp-1 text-center text-[10px] text-[var(--color-text-secondary)]">
            {{ actor.character }}
          </span>
        </div>
      }
    </div>
  </section>
}
