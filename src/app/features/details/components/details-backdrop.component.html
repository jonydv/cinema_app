<!-- Backdrop with gradient + title overlay -->
<div class="relative aspect-video w-full overflow-hidden bg-(--color-skeleton) md:aspect-21/9">
  @if (movie().backdropUrl) {
    <img
      [src]="movie().backdropUrl"
      [alt]="'a11y.backdropAlt' | transloco: { title: movie().title }"
      class="h-full w-full object-cover"
      fetchpriority="high"
    />
  }

  <!-- Gradient overlays: bottom-up for text, right-side for desktop layout -->
  <div class="absolute inset-0 bg-linear-to-t from-black/90 via-black/30 to-transparent"></div>
  <div class="absolute inset-0 bg-linear-to-r from-black/30 to-transparent hidden md:block"></div>

  <!-- Title + tagline overlaid at bottom -->
  <div class="absolute bottom-0 left-0 right-0 p-4 md:p-8">
    <h1
      class="line-clamp-3 text-2xl font-bold leading-tight text-white drop-shadow-lg md:text-4xl lg:text-5xl"
      tabindex="-1"
    >
      {{ movie().title }}
    </h1>
    @if (movie().tagline) {
      <p class="mt-1.5 text-sm italic text-white/65 md:mt-2 md:text-base">{{ movie().tagline }}</p>
    }
  </div>

  <!-- Favorite button — top right -->
  <button
    type="button"
    class="absolute right-4 top-4 flex min-h-[48px] min-w-[48px] items-center justify-center rounded-full bg-black/55 text-white backdrop-blur-md transition-all duration-200 md:hover:scale-110 md:hover:bg-(--color-primary)"
    [attr.aria-label]="(isFavorite() ? 'movie.removeFavorite' : 'movie.addFavorite') | transloco"
    [attr.aria-pressed]="isFavorite()"
    (click)="onFavoriteClick()"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="h-5 w-5"
      viewBox="0 0 24 24"
      aria-hidden="true"
      [attr.fill]="isFavorite() ? '#e50914' : 'none'"
      stroke="currentColor"
      stroke-width="2"
      [class.text-red-500]="isFavorite()"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
      />
    </svg>
  </button>
</div>

<!-- Metadata chips row -->
<div class="flex flex-wrap items-center gap-2 px-4 py-3 md:px-6">
  @for (genre of movie().genres; track genre) {
    <span
      class="rounded-full bg-(--color-surface-2) px-3 py-1 text-xs font-medium text-(--color-text-secondary)"
    >
      {{ genre }}
    </span>
  }

  <div class="ml-auto flex items-center gap-4 text-sm">
    <span class="flex items-center gap-1 font-semibold text-amber-500">
      <span aria-hidden="true">★</span>
      {{ ratingDisplay() }}
    </span>
    <span class="text-(--color-text-secondary)">{{ movie().releaseYear }}</span>
    @if (movie().runtime) {
      <span class="text-(--color-text-secondary)"
        >{{ movie().runtime }}&nbsp;{{ 'movie.minutes' | transloco }}</span
      >
    }
  </div>
</div>
