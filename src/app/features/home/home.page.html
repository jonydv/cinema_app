<div class="relative min-h-screen">
  <header class="px-4 pb-2 pt-4 md:px-6 md:pt-6">
    <h1 class="text-2xl font-bold text-[var(--color-text-primary)]" tabindex="-1">
      {{ 'home.title' | transloco }}
    </h1>
  </header>

  <!-- Filter bar (desktop inline) + FAB (mobile, fixed) + BottomSheet -->
  <div class="px-4 md:px-6">
    <app-home-filters />
  </div>

  <main class="px-4 pb-24 md:px-6 md:pb-8">
    <!-- Movie grid -->
    <div class="grid grid-cols-2 gap-2 md:grid-cols-4 lg:grid-cols-5 md:gap-6">
      @for (movie of facade.movies(); track movie.id) {
        <app-movie-card
          [movie]="movie"
          [isFavorite]="facade.isFavorite(movie.id)"
          (favoriteToggled)="facade.toggleFavorite($event)"
        />
      }

      @if (facade.isLoading()) {
        @for (i of skeletonRange; track i) {
          <app-skeleton-card />
        }
      }
    </div>

    <!-- Empty state: only after load finishes with no results -->
    @if (!facade.isLoading() && facade.movies().length === 0) {
      <app-empty-state
        icon="🎬"
        [title]="'empty.error' | transloco"
        [subtitle]="'errors.serverError' | transloco"
      />
    }

    <!-- Infinite scroll sentinel: observed by IntersectionObserver -->
    @if (facade.hasMore()) {
      <div
        appInfiniteScroll
        [threshold]="0.1"
        (scrolled)="onScrolled()"
        class="h-8"
        aria-hidden="true"
      ></div>
    }
  </main>
</div>
