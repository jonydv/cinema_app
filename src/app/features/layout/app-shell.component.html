<!-- Skip navigation link (keyboard a11y) -->
<a
  href="#main-content"
  class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-100 focus:rounded-lg focus:bg-(--color-primary) focus:px-4 focus:py-2 focus:text-white focus:no-underline"
>
  {{ 'nav.skip' | transloco }}
</a>

<!-- Mobile header — logo only (hidden on md:) -->
<header
  class="fixed left-0 right-0 top-0 z-30 flex h-12 items-center border-b border-(--color-border) bg-(--color-bg)/90 px-4 backdrop-blur-md md:hidden"
>
  <a
    routerLink="/"
    class="transition-opacity duration-200 active:opacity-60"
    aria-label="CineScope — Inicio"
  >
    <app-logo [isDark]="themeService.theme() === 'dark'" />
  </a>
</header>

<!-- Desktop navbar -->
<app-desktop-navbar />

<!-- Main content area -->
<main id="main-content" class="min-h-dvh pb-20 pt-12 md:pb-7 md:pt-16" tabindex="-1">
  <router-outlet />
</main>

<!-- Desktop footer strip (fixed, hidden on mobile where tab bar lives) -->
<footer
  class="hidden md:flex md:fixed md:bottom-0 md:left-0 md:right-0 md:z-30 md:h-7 md:items-center md:justify-center md:border-t md:border-(--color-border) md:bg-(--color-bg)/90 md:backdrop-blur-sm"
>
  <p class="text-xs text-(--color-text-secondary)">
    © {{ currentYear }} CineScope &mdash;
    <a
      href="https://www.jonatandvillalbaweb.com.ar/"
      target="_blank"
      rel="noopener noreferrer"
      class="underline-offset-2 transition-colors duration-150 md:hover:text-(--color-text-primary) md:hover:underline"
    >
      Jonatan Villalba
    </a>
  </p>
</footer>

<!-- Mobile tab bar + settings panel -->
<app-mobile-tab-bar />

<!-- Toast outlet -->
<app-toast />

<!-- PWA install banner -->
@if (canInstall()) {
  <div
    class="fixed bottom-20 left-4 right-4 z-50 flex items-center gap-3 rounded-2xl bg-(--color-surface) p-4 shadow-2xl ring-1 ring-black/10 md:bottom-6 md:left-auto md:right-6 md:max-w-xs dark:ring-white/10"
    role="region"
    aria-label="Instalar app"
  >
    <div
      class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-(--color-primary) text-white"
    >
      <svg
        class="size-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
        aria-hidden="true"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"
        />
      </svg>
    </div>
    <div class="flex-1 min-w-0">
      <p class="text-sm font-semibold text-(--color-text-primary)">Instalar MovieApp</p>
      <p class="truncate text-xs text-(--color-text-secondary)">
        Accede desde tu pantalla de inicio
      </p>
    </div>
    <button
      type="button"
      class="shrink-0 rounded-lg bg-(--color-primary) px-3 py-1.5 text-xs font-semibold text-white transition-opacity md:hover:opacity-90"
      (click)="promptInstall()"
    >
      Instalar
    </button>
    <button
      type="button"
      class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-(--color-text-secondary) transition-colors md:hover:bg-(--color-surface-2)"
      aria-label="Cerrar"
      (click)="dismissInstall()"
    >
      <svg
        class="size-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
        aria-hidden="true"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
}
