<div
  aria-live="polite"
  aria-atomic="false"
  class="pointer-events-none fixed bottom-20 left-0 right-0 z-50 flex flex-col items-center gap-2 px-4 md:bottom-4"
>
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      role="status"
      class="pointer-events-auto flex w-full max-w-sm items-center gap-3 rounded-lg px-4 py-3 text-sm font-medium text-white shadow-lg"
      [class]="toastBg(toast.type)"
    >
      <span aria-hidden="true">{{ toastIcon(toast.type) }}</span>
      <span class="flex-1">{{ toast.message }}</span>
      <button
        type="button"
        class="ml-auto shrink-0 rounded p-1 opacity-70 transition-opacity md:hover:opacity-100 focus-visible:outline focus-visible:outline-2"
        aria-label="Cerrar"
        (click)="toastService.dismiss(toast.id)"
      >
        ✕
      </button>
    </div>
  }
</div>
