name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create stub environment files
        run: |
          mkdir -p src/environments
          printf 'export const environment = {\n  production: false,\n  tmdbApiUrl: "https://api.themoviedb.org/3",\n  tmdbImageBaseUrl: "https://image.tmdb.org/t/p",\n  tmdbBearerToken: "",\n};\n' > src/environments/environment.ts

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create environment files
        env:
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
        run: |
          mkdir -p src/environments
          printf 'export const environment = {\n  production: false,\n  tmdbApiUrl: "https://api.themoviedb.org/3",\n  tmdbImageBaseUrl: "https://image.tmdb.org/t/p",\n  tmdbBearerToken: "",\n};\n' > src/environments/environment.ts
          printf 'export const environment = {\n  production: true,\n  tmdbApiUrl: "https://api.themoviedb.org/3",\n  tmdbImageBaseUrl: "https://image.tmdb.org/t/p",\n  tmdbBearerToken: "%s",\n};\n' "$TMDB_BEARER_TOKEN" > src/environments/environment.prod.ts

      - name: Build (production)
        run: npm run build:prod

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
