version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Argentina/Buenos_Aires
    open-pull-requests-limit: 5
    groups:
      angular:
        patterns:
          - '@angular/*'
          - '@angular-eslint/*'
      ngrx:
        patterns:
          - '@ngrx/*'
      dev-tooling:
        patterns:
          - 'vitest'
          - 'eslint*'
          - 'prettier*'
          - 'typescript*'
          - 'husky'
          - 'lint-staged'
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
